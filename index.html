<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>100 Miembros Dijeron | Tablero</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="board">
  <main class="stage-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="roundLabel">Ronda 1</p>
        <h1>100 Miembros Dijeron</h1>
      </div>
      <nav class="page-actions" aria-label="Paginas">
        <a class="ghost-button" href="./control.html">Control</a>
      </nav>
    </header>

    <section class="question-band" aria-live="polite">
      <span id="questionText"></span>
    </section>

    <section class="score-strip" aria-label="Marcador">
      <div class="score-meter">
        <span>Puntos</span>
        <strong id="scoreTotal">0</strong>
      </div>
      <div class="strike-row" id="strikeRow" aria-label="Fallas"></div>
    </section>

    <section class="answer-board" id="answerBoard" aria-label="Respuestas"></section>
  </main>

  <div class="strike-overlay" id="strikeOverlay" aria-hidden="true">
    <strong>X</strong>
  </div>

  <script src="./app.js"></script>
</body>
</html>
